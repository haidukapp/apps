<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haiduk Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111114;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .sub { color: #888; font-size: 1rem; margin-bottom: 60px; }
    .apps { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .card {
      background: #1c1c20;
      border: 1px solid #2a2a30;
      border-radius: 20px;
      padding: 32px 28px;
      width: 280px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #e65100; transform: translateY(-3px); }
    .icon {
      width: 64px; height: 64px;
      background: #e65100;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 6px; }
    .card p { font-size: 0.875rem; color: #888; line-height: 1.5; margin-bottom: 16px; }
    .link { font-size: 0.8rem; color: #e65100; }
    footer { margin-top: 80px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Haiduk Apps</h1>
  <p class="sub">Mobile apps</p>

  <div class="apps">
    <a class="card" href="/gymlog/">
      <div class="icon">🏋️</div>
      <h2>Gym Log</h2>
      <p>Your personal gym companion. Track workouts, rest timers and progress — fully offline.</p>
      <span class="link">Privacy Policy →</span>
    </a>
  </div>
</body>
</html>
